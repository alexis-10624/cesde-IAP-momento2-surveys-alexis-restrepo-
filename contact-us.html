<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Contacto</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Formulario de Contacto</h1>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Inicio</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <article>
                <form action="/enviar" method="post">
                    
                    <fieldset>
                        <legend>Información de contacto</legend>
                        
                        <p>
                            <label for="nombre">Nombre completo:</label>
                            <input type="text" id="nombre" name="nombre" required>
                        </p>

                        <p>
                            <label for="email">Correo electrónico:</label>
                            <input type="email" id="email" name="email" required>
                        </p>
                    </fieldset>

                    <fieldset>
                        <legend>Detalles de la consulta</legend>

                        <p>¿Qué tipo de atención requiere?</p>
                        <input type="radio" id="tipo1" name="tipo" value="presencial">
                        <label for="tipo1">Presencial</label>
                        <input type="radio" id="tipo2" name="tipo" value="virtual">
                        <label for="tipo2">Virtual</label>

                        <p>
                            <label for="asunto">Seleccione el motivo:</label>
                            <select id="asunto" name="asunto">
                                <option value="info">Información general</option>
                                <option value="queja">Queja</option>
                                <option value="sugerencia">Sugerencia</option>
                                <option value="reclamo">Reclamo</option>
                            </select>
                        </p>

                        <p>
                            <label for="mensaje">Otra:</label>
                            <textarea id="mensaje" name="mensaje" rows="2" cols="50" placeholder="Escriba aquí su mensaje"></textarea>
                        </p>

                        <p>
                            <input type="checkbox" id="acepto" name="acepto">
                            <label for="acepto">Acepto la política de privacidad</label>
                        </p>
                    </fieldset>

                    <br>

                    <button type="submit">Enviar formulario</button>
                </form>
            </article>
        </section>
    </main>

    <footer>
        <p>© 2026 - Todos los derechos reservados.</p>
    </footer>

</body>
</html>
